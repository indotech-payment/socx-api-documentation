# Repo: https://github.com/maulana222/socx-api-documentation
#
# WAJIB: jalankan MkDocs dari folder yang berisi file INI (bukan dari parent monorepo lain):
#   cd <repo-docs> && mkdocs serve
# Lihat README.md — bagian "Pratinjau lokal (MkDocs)".

site_name: Dokumentasi API Indotech
strict: true
site_description: Integrasi H2H Reseller Indotech — direct purchase, saldo, status, inquiry
site_author: Indotech

repo_url: https://github.com/maulana222/socx-api-documentation
edit_uri: edit/main/doc/

docs_dir: doc

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode gelap
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode terang
  features:
    # navigation.instant dinonaktifkan: cache pratinjau bisa menampilkan item nav lama
    # (mis. judul halaman yang sudah dihapus/diubah) sampai hard refresh.
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Beranda: index.md
  - Persiapan integrasi: 02-persiapan-integrasi.md
  - Introduction & Transaction Flow: introduction-transaction-flow.md
  - PREPAID (Pulsa, Data):
      - "Pulsa & Data": transaksi-direct/pembelian-pulsa-data.md
      - Test Case: transaksi-direct/skenario-pengujian.md
  - GAME:
      - "Top Up & Voucher": game/topup-voucher.md
      - Test Case: transaksi-direct/skenario-pengujian.md
  - EWALLET:
      - "Ewallet Direct Purchase": transaksi-direct/pembelian-ewallet.md
      - Test Case: transaksi-direct/skenario-pengujian.md
      - "DANA (inquiry)": ewallet/dana-inquiry.md
  - Inquiry PLN: inquiry/inquiry-pln.md
  - Referensi Teknis:
      - Cek saldo: transaksi-direct/cek-saldo.md
      - Cek status: transaksi-direct/cek-status.md
      - Lampiran — deposit tiket: appendix-deposit-ticket.md
      - Kode respons (RC): transaksi-direct/kode-respons.md

extra:
  generator: false


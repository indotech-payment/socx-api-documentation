# Repo: https://github.com/maulana222/socx-api-documentation
#
# WAJIB: jalankan MkDocs dari folder yang berisi file INI (bukan dari parent monorepo lain):
#   cd <repo-docs> && mkdocs serve
# Lihat README.md — bagian "Pratinjau lokal (MkDocs)".

site_name: Dokumentasi API Indotech
strict: true
site_description: Integrasi H2H Reseller Indotech — direct purchase, saldo, status, inquiry
site_author: Indotech

repo_url: https://github.com/maulana222/socx-api-documentation
edit_uri: edit/main/doc/

docs_dir: doc

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode gelap
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode terang
  features:
    # navigation.instant dinonaktifkan: cache pratinjau bisa menampilkan item nav lama
    # (mis. judul halaman yang sudah dihapus/diubah) sampai hard refresh.
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Beranda: index.md
  - Introduction & Transaction Flow:
      - Ringkasan alur: introduction-transaction-flow.md
      - Pengenalan: 01-pengenalan.md
      - Direct Purchase without Inquiry: transaksi-direct/flow-direct-purchase-without-inquiry.md
      - "payment with inquiry": transaksi-direct/payment-with-inquiry.md
  - PREPAID (Pulsa, Data):
      - Request: transaksi-direct/pembelian-json-post.md
      - Respon: transaksi-direct/contoh-respons-pulsa.md
      - Test Case: transaksi-direct/skenario-pengujian.md
  - GAME:
      - Top Up & Voucher:
          - Top-up — tanpa zona (non-zone): game/topup-non-zone.md
          - Top-up — dengan zona: game/topup-zona.md
          - Voucher: game/voucher.md
      - Semua klasifikasi:
          - Request: transaksi-direct/pembelian-json-post.md
          - Respon: transaksi-direct/klasifikasi-produk-game.md
          - Test Case: transaksi-direct/skenario-pengujian.md
  - EWALLET:
      - Ewallet Direct Purchase:
          - Request: transaksi-direct/pembelian-json-post.md
          - Respon: transaksi-direct/kode-respons.md
          - Test Case: transaksi-direct/skenario-pengujian.md
      - DANA (inquiry):
          - Ringkasan: ewallet/dana-inquiry.md
          - Denom tetap: ewallet/dana-inquiry-denom-tetap.md
          - Denom Bebas: ewallet/dana-inquiry-denom-bebas.md
  - Inquiry PLN: inquiry/inquiry-pln.md
  - Referensi Teknis:
      - Persiapan integrasi: 02-persiapan-integrasi.md
      - Cek saldo: transaksi-direct/cek-saldo.md
      - Pembelian HTTP: transaksi-direct/pembelian-http.md
      - Pembelian XML: transaksi-direct/pembelian-xml.md
      - Cek status: transaksi-direct/cek-status.md
      - Kode respons (RC): transaksi-direct/kode-respons.md
      - Inquiry POST (JSON): inquiry/inquiry-post.md
  - Lampiran — deposit tiket: appendix-deposit-ticket.md

extra:
  generator: false
